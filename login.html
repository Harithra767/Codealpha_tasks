<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Login Page</h1>

<div style="text-align:center; margin-top:50px;">
    <input id="user" placeholder="Username" style="padding:10px; width:200px;"><br><br>
    <input id="pass" type="password" placeholder="Password" style="padding:10px; width:200px;"><br><br>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234") {
        localStorage.setItem("loggedIn", "true");
        document.getElementById("msg").innerText = "✅ Correct Login... Redirecting";

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1200);

    } else {
        document.getElementById("msg").innerText = "❌ Wrong username or password";
    }
}
</script>

</body>
</html>
